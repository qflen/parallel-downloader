name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR so a fast follow-up commit
# doesn't queue behind the build it just made stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: gradle check (${{ matrix.os }} / JDK ${{ matrix.jdk }})
    strategy:
      # Don't abort sibling jobs on first failure — a Windows-specific flake
      # shouldn't hide the Linux + macOS results, and vice versa.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        jdk: ['17', '21']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs detekt, the unit/integration test suite, and the JaCoCo 90/85
      # coverage gate. Stress tests live behind ./gradlew stressTest and JMH
      # benchmarks behind ./gradlew jmh - both run on demand only, not here.
      - name: Run gradle check
        run: ./gradlew --no-daemon check

      - name: Upload JaCoCo HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report-${{ matrix.os }}-jdk${{ matrix.jdk }}
          path: build/reports/jacoco/test/html/
          if-no-files-found: ignore
          retention-days: 7

      # Coverage upload only runs once per PR — coverage doesn't vary across the
      # OS/JDK matrix entries (same source, same tests), so the other entries
      # would just churn the codecov report.
      - name: Upload JaCoCo XML report
        if: success() && matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: ignore
          retention-days: 30

      # Activates once the repo is connected at https://about.codecov.io/ - public
      # repos work tokenless; for a private repo, set CODECOV_TOKEN as a repo secret.
      # `fail_ci_if_error: false` keeps a transient codecov outage from breaking the
      # CI gate (the JaCoCo XML is still uploaded as an artifact above).
      - name: Upload coverage to Codecov
        if: success() && matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
