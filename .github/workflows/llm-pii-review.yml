name: LLM PII review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read the diff, post a single comment if needed - no need for write access to
# code itself. Allowing pull-requests:write so the script can comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic==0.39.0 requests==2.32.3 pytest==8.3.3

      - name: Run unit tests
        run: pytest .github/scripts/tests -v

      - name: Run LLM PII review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty when the secret hasn't been wired into the repo; the script
          # then exits 0 cleanly with a "skipping" log line and the workflow
          # stays green. See README's "LLM PII review" section.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Skip on workflow_dispatch (no PR context); the unit tests above
        # already validate the script in that mode.
        if: github.event_name == 'pull_request'
        run: python .github/scripts/llm_pii_review.py
